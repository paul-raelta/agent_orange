<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Orange</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07090c; --panel:#0d1117; --panel-2:#11161d; --raised:#161d27;
  --line:#222b37; --line-soft:#1a212b;
  --text:#e4e8ee; --text-2:#929dac; --text-3:#5f6975;
  --accent:#e8723a; --accent-soft:rgba(232,114,58,.13); --accent-line:rgba(232,114,58,.4);
  --green:#4ec77a; --red:#ff6b5e; --amber:#e3a52e; --blue:#5aa2f0;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --r:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#000; color:var(--text); font-family:var(--mono);
  font-size:13px; line-height:1.4; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select{font-family:inherit}
::selection{background:var(--accent);color:#08090b}
.lbl{font-size:9.5px;letter-spacing:.13em;color:var(--text-3);text-transform:uppercase;font-weight:600}

/* ===== Device frame ===== */
.frame{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.frame-bar{height:34px;flex:0 0 34px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:#050608;border-bottom:1px solid var(--line);}
.frame-brand{font-size:10px;letter-spacing:.28em;color:var(--text-3);font-weight:700}
.frame-toggle{display:flex;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:2px}
.frame-toggle button{font-size:9px;letter-spacing:.12em;padding:3px 9px;border-radius:3px;color:var(--text-3);font-weight:600}
.frame-toggle button.active{background:var(--accent);color:#08090b}

/* shell + container query target */
.app-shell{flex:1;min-height:0;display:flex;container-type:inline-size;background:var(--bg);overflow:hidden}
.frame.dev-mobile .app-shell{width:402px;max-width:100%;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line);
  box-shadow:0 0 0 1px #000, 0 30px 80px rgba(0,0,0,.6)}

/* ===== Sidebar nav ===== */
.nav{flex:0 0 212px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 12px}
.nav-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
.brand-mark{width:16px;height:16px;background:var(--accent);transform:rotate(45deg);
  box-shadow:0 0 14px rgba(232,114,58,.6);flex:0 0 auto}
.brand-text{font-size:11px;letter-spacing:.18em;color:var(--text-2);line-height:1.25}
.brand-text b{color:var(--text);font-weight:700}
.nav-list{list-style:none;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{width:100%;display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r);
  color:var(--text-2);font-size:12.5px;position:relative;transition:.12s}
.nav-item:hover{background:var(--panel-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);box-shadow:inset 2px 0 0 var(--accent)}
.nav-icon{font-size:13px;width:15px;text-align:center;opacity:.85}
.nav-badge{margin-left:auto;background:var(--blue);color:#06121f;font-size:9.5px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px}
.nav-foot{margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft)}
.nav-usage{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--r);padding:9px 10px}
.nu-top{display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.12em;color:var(--text-2);font-weight:600}
.nu-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.nu-bar{height:3px;background:var(--line);border-radius:2px;margin:7px 0 5px;overflow:hidden}
.nu-bar span{display:block;height:100%;background:var(--accent)}
.nu-lab{font-size:9.5px;color:var(--text-3)}

/* ===== Content ===== */
.content{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden}
.screen{padding:26px 30px 60px;max-width:1180px;margin:0 auto}
.screen-hd{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.screen-title{font-size:20px;letter-spacing:.13em;font-weight:700}
.screen-sub{font-size:11.5px;color:var(--text-2);margin-top:5px;max-width:680px}
.screen-actions{display:flex;align-items:center;gap:14px}
.sync{font-size:10px;color:var(--text-3)}
.s-ok{color:var(--green)} .s-review{color:var(--blue)} .s-watch{color:var(--amber)}
.back{font-size:11px;color:var(--text-2);margin-bottom:14px;letter-spacing:.04em}
.back:hover{color:var(--accent)}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r);
  font-size:11px;letter-spacing:.07em;font-weight:600;transition:.12s;white-space:nowrap}
.btn-sm{padding:6px 11px;font-size:10.5px}
.btn-icon{font-size:12px}
.btn-primary{background:var(--accent);color:#08090b}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:disabled{opacity:.55;cursor:default}
.btn-ghost{background:var(--panel-2);color:var(--text-2);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-3)}
.btn-review{background:rgba(90,162,240,.14);color:var(--blue);border:1px solid rgba(90,162,240,.35)}
.btn-danger{background:rgba(255,107,94,.1);color:var(--red);border:1px solid rgba(255,107,94,.3)}

/* ===== Chips / badges ===== */
.chip{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;letter-spacing:.1em;font-weight:600;
  padding:4px 9px;border-radius:20px;border:1px solid var(--line);white-space:nowrap}
.chip-dot{width:6px;height:6px;border-radius:50%}
.chip-dot.pulse{animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor}50%{opacity:.5}}
.st-ok{color:var(--green);background:rgba(78,199,122,.08);border-color:rgba(78,199,122,.25)}
.st-review{color:var(--blue);background:rgba(90,162,240,.08);border-color:rgba(90,162,240,.25)}
.st-watch{color:var(--amber);background:rgba(227,165,46,.08);border-color:rgba(227,165,46,.25)}
.st-err{color:var(--red);background:rgba(255,107,94,.08);border-color:rgba(255,107,94,.25)}

.conf{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.08em;font-weight:700;
  padding:2px 6px;border-radius:4px;border:1px solid transparent}
.conf-btn{cursor:pointer}.conf-btn:hover{border-color:currentColor}
.conf-bars{display:inline-flex;gap:1.5px;align-items:flex-end;height:9px}
.conf-bars i{width:2px;background:currentColor;opacity:.25}
.conf-bars i:nth-child(1){height:4px}.conf-bars i:nth-child(2){height:6.5px}.conf-bars i:nth-child(3){height:9px}
.conf-bars i.on{opacity:1}
.cf-high{color:var(--green);background:rgba(78,199,122,.08)}
.cf-med{color:var(--amber);background:rgba(227,165,46,.08)}
.cf-low{color:var(--red);background:rgba(255,107,94,.08)}

.delta{font-size:11px;font-weight:600}
.delta-up{color:var(--green)} .delta-down{color:var(--red)} .delta-na{color:var(--text-3)}

.price{display:inline-flex;align-items:baseline;gap:8px}
.price-val{font-size:16px;font-weight:600;letter-spacing:.02em}
.price-chg{font-size:11px;font-weight:600}

.spark{flex:0 0 auto}

/* ===== Glyph ===== */
.glyph{width:34px;height:34px;flex:0 0 34px;border-radius:7px;display:grid;place-items:center;
  font-size:11.5px;font-weight:700;letter-spacing:.04em;background:var(--raised);
  color:var(--text);border:1px solid var(--line);box-shadow:inset 0 0 0 1px transparent,0 0 0 1px transparent;position:relative}
.glyph::after{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;border-radius:2px;background:var(--g)}

/* ===== Panel ===== */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
.panel-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line-soft);background:var(--panel-2)}
.panel-title{font-size:10.5px;letter-spacing:.13em;font-weight:600;color:var(--text-2)}
.panel-right{font-size:10px;color:var(--text-3)}
.panel-bd{padding:16px}
.panel-bd.nopad{padding:0}
.hint{font-size:9.5px;color:var(--text-3);font-style:italic;font-family:var(--sans)}

/* ===== Watchlist grid + cards ===== */
.wl-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.wl-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;
  transition:.14s;position:relative;display:flex;flex-direction:column;gap:14px}
.wl-card:hover{border-color:var(--text-3);transform:translateY(-2px)}
.wl-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.wl-card.status-validated::before{background:var(--green)}
.wl-card.status-review::before{background:var(--blue)}
.wl-card.status-watching::before{background:var(--amber)}
.wl-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.wl-id{display:flex;gap:11px;align-items:center;min-width:0}
.wl-ticker{font-size:17px;font-weight:700;letter-spacing:.04em}
.wl-name{font-size:10px;color:var(--text-3);font-family:var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.wl-pricerow{display:flex;justify-content:space-between;align-items:center}
.wl-period{display:flex;align-items:baseline;gap:8px;padding:9px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
.wl-period-lab{font-size:8.5px;letter-spacing:.13em;color:var(--text-3);font-weight:600}
.wl-period-val{font-size:13px;font-weight:600;color:var(--accent)}
.wl-period-end{font-size:10px;color:var(--text-3);margin-left:auto}
.wl-metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.wl-metric{display:flex;flex-direction:column;gap:3px;min-width:0}
.wl-metric-top{display:flex;justify-content:space-between;align-items:center;gap:4px;min-width:0}
.wl-metric-key{font-size:8.5px;letter-spacing:.06em;color:var(--text-3);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-metric-val{font-size:16px;font-weight:600}
.wl-foot{margin-top:2px}
.wl-foot-cta{width:100%;text-align:left;font-size:11px;font-weight:600;padding:9px 11px;border-radius:6px}
.wl-foot-cta.review{background:rgba(90,162,240,.12);color:var(--blue);border:1px solid rgba(90,162,240,.3)}
.wl-foot-cta.review:hover{background:rgba(90,162,240,.2)}
.wl-foot-note{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text-2)}
.wl-foot-note.ok{color:var(--green)}

/* ===== Company deep-dive ===== */
.co-hd{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.co-ticker{font-size:22px;font-weight:700;letter-spacing:.03em;display:flex;align-items:baseline;gap:10px}
.co-hd .wl-name{max-width:none;white-space:normal}
.co-sector{font-size:10px;font-weight:500;color:var(--text-3);letter-spacing:.08em}
.co-hd-right{display:flex;align-items:center;gap:16px}
.co-srcrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.src-pill{font-size:10px;color:var(--text-2);background:var(--panel-2);border:1px solid var(--line);padding:4px 9px;border-radius:5px}
.src-pill b{color:var(--accent);font-size:9px;letter-spacing:.06em}
.src-pill.primary{border-color:var(--accent-line)}
.src-pill.sm{font-size:9px;padding:3px 7px}
.src-mode{font-size:9.5px;color:var(--text-3);margin-left:auto}
.banner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 15px;border-radius:var(--r);margin-bottom:16px;font-size:11.5px}
.banner-review{background:rgba(90,162,240,.1);border:1px solid rgba(90,162,240,.3);color:var(--blue)}
.banner-ok{background:rgba(78,199,122,.09);border:1px solid rgba(78,199,122,.3);color:var(--green)}

.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line)}
.tab{padding:9px 14px;font-size:10.5px;letter-spacing:.1em;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* table */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th,.tbl td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--line-soft);white-space:nowrap}
.tbl thead th{background:var(--panel-2);position:sticky;top:0}
.th-period{font-size:11px;font-weight:700;color:var(--text)}
.th-end{font-size:9px;color:var(--text-3);font-weight:400}
.sticky-col{text-align:left!important;position:sticky;left:0;background:var(--panel);z-index:2}
.rowlab{color:var(--text-2);font-size:11px}
.rowlab.dim{color:var(--text-3);font-size:9.5px;letter-spacing:.08em}
.cell-val{font-weight:600}
.cell-latest{background:var(--accent-soft)}
thead .cell-latest,td.cell-latest{box-shadow:inset 0 0 0 1px rgba(232,114,58,.12)}
.tbl-note{padding:10px 16px;font-size:10px;color:var(--text-3);font-family:var(--sans);border-top:1px solid var(--line-soft)}

/* validation */
.val-card{border-radius:var(--r);padding:15px;border:1px solid var(--line);margin-bottom:16px}
.val-card.pass{background:rgba(78,199,122,.06);border-color:rgba(78,199,122,.25)}
.val-card.fail{background:rgba(227,165,46,.06);border-color:rgba(227,165,46,.3)}
.val-top{display:flex;align-items:center;gap:12px;margin-bottom:9px;flex-wrap:wrap}
.val-badge{font-size:11px;font-weight:700;letter-spacing:.08em}
.val-badge.pass{color:var(--green)} .val-badge.fail{color:var(--amber)}
.val-rule{font-size:10px;color:var(--text-3)}
.val-detail{font-size:11.5px;color:var(--text-2);font-family:var(--sans);line-height:1.55}
.val-meta{display:flex;gap:16px;margin-top:10px;font-size:10px;color:var(--text-3)}
.val-conflict{color:var(--red)}
.metric-list{display:flex;flex-direction:column;gap:1px}
.metric-row{display:grid;grid-template-columns:1.4fr 1fr .8fr .8fr auto;align-items:center;gap:12px;padding:11px 12px;
  border:1px solid var(--line-soft);border-radius:6px;cursor:pointer;transition:.12s}
.metric-row:hover{border-color:var(--text-3);background:var(--panel-2)}
.mr-key{font-size:11px;color:var(--text-2)}
.mr-val{font-size:14px;font-weight:600}
.mr-prov{font-size:10px;color:var(--accent);text-align:right}

/* ===== Log ===== */
.log{list-style:none}
.log-row{display:grid;grid-template-columns:108px 54px 1fr auto;gap:12px;align-items:baseline;padding:9px 16px;border-bottom:1px solid var(--line-soft);font-size:11px}
.log-row:hover{background:var(--panel-2)}
.log-t{color:var(--text-3);font-size:10px;white-space:nowrap}
.log-agent{font-weight:700;font-size:10px;letter-spacing:.05em}
.log-msg{color:var(--text-2);font-family:var(--sans);font-size:11.5px;line-height:1.45}
.log-cost{color:var(--text-3);font-size:9.5px;white-space:nowrap;text-align:right}
.lvl-warn .log-msg{color:#f0c98a}
.lvl-warn .log-agent{color:var(--amber)}
.lvl-ok .log-agent{color:var(--green)}
.lvl-info .log-agent{color:var(--text-2)}
.log-agent.ag-NVDA{color:var(--accent)}

/* ===== Drawer ===== */
.drawer-root{position:fixed;inset:0;pointer-events:none;z-index:50}
.drawer-root.open{pointer-events:auto}
.drawer-scrim{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:.2s}
.drawer-root.open .drawer-scrim{opacity:1}
.drawer{position:absolute;right:0;top:0;bottom:0;width:min(460px,92vw);background:var(--panel);
  border-left:1px solid var(--line);transform:translateX(100%);transition:.24s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer-root.open .drawer{transform:none}
.drawer-hd{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}
.drawer-bd{padding:18px;overflow-y:auto}
.x-btn{font-size:14px;color:var(--text-3);width:26px;height:26px;border-radius:5px}
.x-btn:hover{color:var(--text);background:var(--panel-2)}
.drawer-metric{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dm-val{font-size:26px;font-weight:700}
.dm-yoy{font-size:10px;color:var(--text-3)}
.drawer-help{font-size:11px;color:var(--text-3);font-family:var(--sans);line-height:1.55;margin-bottom:16px}

/* provenance */
.prov{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:6px;padding:12px;margin-bottom:11px}
.prov-hd{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.prov-src{font-size:10.5px;font-weight:600;color:var(--text);line-height:1.35;flex:1;min-width:0}
.prov-page{font-size:9.5px;color:var(--accent);font-weight:600;flex:0 0 auto}
.prov-url{display:block;font-size:10px;color:var(--blue);margin:4px 0 8px;text-decoration:none;word-break:break-all}
.prov-url:hover{text-decoration:underline}
.prov-quote{font-family:var(--sans);font-size:11px;color:var(--text-2);line-height:1.55;
  border-left:2px solid var(--accent-line);padding:2px 0 2px 10px}

/* ===== Timeline ===== */
.tl{padding:6px 0}
.tl-head,.tl-lane{display:flex;align-items:stretch}
.tl-lanelabel{flex:0 0 120px;display:flex;align-items:center;gap:9px;padding:0 14px;font-size:12px;font-weight:600}
.tl-head .tl-lanelabel{flex:0 0 120px}
.tl-track{flex:1;position:relative;display:flex;height:34px}
.tl-head .tl-track{height:30px;border-bottom:1px solid var(--line)}
.tl-month{font-size:9.5px;color:var(--text-3);letter-spacing:.08em;border-left:1px solid var(--line-soft);padding:8px 0 0 7px;font-weight:600}
.tl-month span{color:#3c444f}
.tl-lane{border-bottom:1px solid var(--line-soft);cursor:pointer}
.tl-lane:hover{background:var(--panel-2)}
.tl-now,.tl-now-line{position:absolute;top:0;bottom:0;width:0;border-left:1px dashed var(--accent-line)}
.tl-now{z-index:3}
.tl-now span{position:absolute;top:6px;left:4px;font-size:8px;color:var(--accent);letter-spacing:.1em;font-weight:700;background:var(--bg);padding:1px 3px}
.tl-bar{position:absolute;top:8px;height:18px;border-radius:4px;display:flex;align-items:center;padding:0 8px;overflow:hidden}
.tl-bar.window{background:rgba(232,114,58,.16);border:1px solid var(--accent-line)}
.tl-bar.watching{background:rgba(227,165,46,.18);border:1px solid rgba(227,165,46,.5);animation:pulse 2s infinite}
.tl-blabel{font-size:9px;color:var(--text);white-space:nowrap;font-weight:600}
.tl-marker{position:absolute;top:0;bottom:0;display:flex;align-items:center;gap:6px;transform:translateX(-3px)}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex:0 0 auto}
.tl-mlabel{font-size:9px;color:var(--text-2);white-space:nowrap}
.tl-legend{display:flex;gap:20px;padding:12px 16px;border-top:1px solid var(--line-soft);font-size:10px;color:var(--text-3)}
.tl-legend .lg{display:inline-block;width:16px;height:9px;border-radius:3px;vertical-align:middle;margin-right:5px}
.lg-reported{background:var(--green);width:9px;height:9px;border-radius:50%}
.lg-window{background:rgba(232,114,58,.2);border:1px solid var(--accent-line)}
.lg-watching{background:rgba(227,165,46,.2);border:1px solid rgba(227,165,46,.5)}

/* timeline — mobile agenda (hidden on desktop, shown via container query) */
.tl-mobile{display:none}
.tla-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;cursor:pointer;transition:.12s}
.tla-card:hover{border-color:var(--text-3)}
.tla-hd{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.tla-ticker{font-size:15px;font-weight:700;letter-spacing:.04em}
.tla-hd .chip{margin-left:auto}
.tla-events{display:flex;flex-direction:column;gap:1px}
.tla-ev{display:grid;grid-template-columns:16px max-content 1fr;align-items:center;gap:10px;padding:9px 2px;border-top:1px solid var(--line-soft)}
.tla-ev-icon{flex:0 0 auto;justify-self:center}
.tla-reported .tla-ev-icon{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.tla-window .tla-ev-icon{width:14px;height:9px;border-radius:2px;background:rgba(232,114,58,.2);border:1px solid var(--accent-line)}
.tla-watching .tla-ev-icon{width:14px;height:9px;border-radius:2px;background:rgba(227,165,46,.2);border:1px solid rgba(227,165,46,.5);animation:pulse 2s infinite}
.tla-ev-type{font-size:8.5px;letter-spacing:.1em;font-weight:700;text-transform:uppercase}
.tla-reported .tla-ev-type{color:var(--green)}
.tla-window .tla-ev-type{color:var(--accent)}
.tla-watching .tla-ev-type{color:var(--amber)}
.tla-ev-label{font-size:11px;color:var(--text-2);text-align:right;font-family:var(--sans);line-height:1.35}
.tla-foot{font-size:9.5px;color:var(--text-3);font-style:italic;font-family:var(--sans);line-height:1.5;margin-top:2px}

/* ===== Review queue ===== */
.rv-list{display:flex;flex-direction:column;gap:14px}
.rv-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;border-left:3px solid var(--blue)}
.rv-card.resolved{opacity:.55;border-left-color:var(--green)}
.rv-hd{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.rv-ticker{font-size:15px;font-weight:700;cursor:pointer}.rv-ticker:hover{color:var(--accent)}
.rv-period{font-size:11px;color:var(--text-2)}
.rv-found{font-size:9.5px;color:var(--text-3);margin-left:auto}
.rv-reason{font-size:12px;color:var(--text);font-family:var(--sans);margin-bottom:12px}
.rv-reason b{font-family:var(--mono);color:var(--accent)}
.rv-candidates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.rv-cand{flex:1;min-width:160px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:10px 12px;display:flex;flex-direction:column;gap:3px}
.rv-cand.chosen{border-color:var(--green);background:rgba(78,199,122,.08)}
.rv-cand-val{font-size:18px;font-weight:700}
.rv-cand-src{font-size:10px;color:var(--text-2)}
.rv-cand-weight{font-size:9px;color:var(--text-3);font-style:italic;font-family:var(--sans)}
.rv-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.rv-done{margin-top:12px;font-size:11px;color:var(--green)}
.empty{padding:30px;text-align:center;color:var(--text-3);font-size:12px;font-family:var(--sans)}

/* ===== Companies config ===== */
.cfg-list{display:flex;flex-direction:column;gap:8px}
.cfg-row{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;transition:.12s;flex-wrap:wrap}
.cfg-row:hover{border-color:var(--text-3)}
.cfg-id{display:flex;flex-direction:column}
.cfg-id b{font-size:13px}.cfg-id span{font-size:10px;color:var(--text-3);font-family:var(--sans)}
.cfg-src{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:120px}
.cfg-cad,.cfg-mode{font-size:10px;color:var(--text-3)}
.add-mode{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.add-mode-note{font-size:10.5px;color:var(--text-3);font-family:var(--sans)}
.seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:2px}
.seg button{font-size:10px;letter-spacing:.08em;padding:5px 12px;border-radius:4px;color:var(--text-3);font-weight:600}
.seg button.active{background:var(--accent);color:#08090b}
.seg-model button.active{background:var(--accent);color:#08090b}
.add-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.inp{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:9px 12px;color:var(--text);font-size:12px;flex:1;min-width:160px}
.inp:focus{outline:none;border-color:var(--accent)}
select.inp{cursor:pointer}
.disco{list-style:none;display:flex;flex-direction:column;gap:7px;font-size:11.5px;font-family:var(--sans)}
.disco li{color:var(--text-3)}
.disco li.ok{color:var(--green)} .disco li.run{color:var(--accent)}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:14px 0}
.kv>div{display:flex;flex-direction:column;gap:4px}
.kv>div span:not(.lbl){font-size:12px;color:var(--text);font-family:var(--sans)}
.adv-block{margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft)}
.adv-hd{font-size:9.5px;letter-spacing:.13em;color:var(--accent);font-weight:600;margin-bottom:12px}
.adv-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;font-size:10.5px;color:var(--text-2)}
.adv-field>span{font-family:var(--sans)}
.taglist{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:5px 10px;border-radius:5px;background:var(--panel-2);border:1px solid var(--line);color:var(--text-3)}
.tag.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
.add-confirm{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}

/* ===== Filters ===== */
.filt{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filt-btn{font-size:10px;letter-spacing:.08em;padding:6px 12px;border-radius:6px;background:var(--panel-2);border:1px solid var(--line);color:var(--text-3);font-weight:600}
.filt-btn.active{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}

/* ===== Settings ===== */
.usage{margin-bottom:18px}
.usage-big{display:flex;align-items:baseline;gap:10px}
.ub-val{font-size:30px;font-weight:700}
.ub-lab{font-size:11px;color:var(--text-3)}
.usage-bar{height:6px;background:var(--line);border-radius:3px;margin:10px 0;overflow:hidden}
.usage-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#f0a070)}
.usage-stats{display:flex;gap:18px;font-size:10.5px;color:var(--text-3)}
.usage-models{display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--line-soft);padding-top:14px}
.um-row{display:grid;grid-template-columns:1.2fr 1.6fr 1fr auto;gap:12px;align-items:center;font-size:11px}
.um-name{font-weight:600}.um-task{color:var(--text-3);font-family:var(--sans);font-size:10.5px}
.um-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.um-bar span{display:block;height:100%;background:var(--accent)}
.um-cost{color:var(--text-2);text-align:right}
.prov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.prov-card{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.prov-card.active{border-color:var(--accent-line);background:var(--accent-soft)}
.prov-card.planned{opacity:.7}
.pc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pc-name{font-size:12px;font-weight:600}
.pc-status{font-size:9px;letter-spacing:.08em;font-weight:700}
.pc-status.active{color:var(--green)} .pc-status.planned{color:var(--text-3)}
.pc-auth{font-size:10px;color:var(--text-3);font-family:var(--sans);margin-bottom:10px}
.pc-models{display:flex;gap:5px;flex-wrap:wrap}
.pc-model{font-size:9px;padding:3px 7px;border-radius:4px;background:var(--panel);border:1px solid var(--line);color:var(--text-2)}
.route{display:flex;flex-direction:column;gap:10px}
.route-row{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.route-task b{font-size:12px}.route-task span{display:block;font-size:10px;color:var(--text-3);font-family:var(--sans);margin-top:2px}

/* ===== Container queries: mobile reflow ===== */
@container (max-width: 700px){
  .nav{position:absolute;left:0;right:0;bottom:0;top:auto;flex:0 0 auto;flex-direction:row;
    border-right:none;border-top:1px solid var(--line);padding:6px 6px;z-index:20;align-items:center}
  .nav-brand,.nav-foot{display:none}
  .nav-list{flex-direction:row;justify-content:space-around;width:100%;gap:0}
  .nav-item{flex-direction:column;gap:3px;padding:6px 4px;font-size:8.5px}
  .nav-item.active{box-shadow:none;background:transparent;color:var(--accent)}
  .nav-icon{font-size:16px}
  .nav-label{font-size:8px;letter-spacing:.04em}
  .nav-badge{position:absolute;top:2px;right:50%;margin-right:-16px}
  .content{padding-bottom:70px}
  .app-shell{position:relative}
  .screen{padding:18px 16px 30px}
  .wl-grid{grid-template-columns:1fr}
  .screen-hd{flex-direction:column;align-items:flex-start}
  .metric-row{grid-template-columns:1fr auto;grid-row-gap:4px}
  .um-row{grid-template-columns:1fr auto}
  .route-row{flex-direction:column;align-items:flex-start}
  .tl-desktop{display:none}
  .tl-mobile{display:flex;flex-direction:column;gap:12px}
}
/* ===== Tweak-driven: density + sparklines ===== */
.no-spark .spark{display:none}
.compact .screen{padding:18px 22px 50px}
.compact .screen-hd{margin-bottom:16px}
.compact .wl-card{padding:12px;gap:10px}
.compact .wl-grid{gap:12px}
.compact .panel-bd{padding:12px}
.compact .wl-metric-val{font-size:14px}
.compact .tbl th,.compact .tbl td{padding:7px 12px}
.compact .log-row{padding:6px 14px}
.compact .metric-row{padding:8px 12px}
.compact .cfg-row{padding:9px 12px}
.compact .panel{margin-bottom:12px}

/* scrollbars */
.content::-webkit-scrollbar,.drawer-bd::-webkit-scrollbar,.tbl-wrap::-webkit-scrollbar{width:9px;height:9px}
.content::-webkit-scrollbar-thumb,.drawer-bd::-webkit-scrollbar-thumb,.tbl-wrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
.content::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Orange — Add Companies</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07090c; --panel:#0d1117; --panel-2:#11161d; --raised:#161d27;
  --line:#222b37; --line-soft:#1a212b;
  --text:#e4e8ee; --text-2:#929dac; --text-3:#5f6975;
  --accent:#e8723a; --accent-soft:rgba(232,114,58,.13); --accent-line:rgba(232,114,58,.40);
  --green:#4ec77a; --red:#ff6b5e; --amber:#e3a52e; --blue:#5aa2f0;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --r:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select{font-family:inherit}
::selection{background:var(--accent);color:#08090b}
.lbl{font-size:9.5px;letter-spacing:.13em;color:var(--text-3);text-transform:uppercase;font-weight:600}

/* shell */
.screen{max-width:1180px;margin:0 auto;padding:30px 30px 120px}
.screen-hd{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.screen-title{font-size:20px;letter-spacing:.13em;font-weight:700}
.screen-sub{font-size:11.5px;color:var(--text-2);margin-top:5px;max-width:680px}
.back{font-size:11px;color:var(--text-2);margin-bottom:14px;letter-spacing:.04em}
.back:hover{color:var(--accent)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r);font-size:11px;letter-spacing:.07em;font-weight:600;transition:.12s;white-space:nowrap}
.btn-sm{padding:6px 11px;font-size:10.5px}
.btn-primary{background:var(--accent);color:#08090b}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:disabled{opacity:.4;cursor:default;filter:none}
.btn-ghost{background:var(--panel-2);color:var(--text-2);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-3)}

/* glyph */
.glyph{width:34px;height:34px;flex:0 0 34px;border-radius:7px;display:grid;place-items:center;font-size:11px;font-weight:700;letter-spacing:.02em;background:var(--raised);color:var(--text);border:1px solid var(--line);position:relative;overflow:hidden}
.glyph::after{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;border-radius:2px;background:var(--g,var(--text-3))}
.glyph.sm{width:26px;height:26px;flex-basis:26px;font-size:9px}

/* src pill */
.src-pill{font-size:10px;color:var(--text-2);display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid var(--line);border-radius:5px;white-space:nowrap}
.src-pill b{color:var(--accent);font-size:9px;letter-spacing:.06em}
.src-pill.primary{border-color:var(--accent-line)}
.src-pill.sm{font-size:9px;padding:3px 7px}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.search{flex:1 1 260px;position:relative;min-width:220px}
.search input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);padding:9px 12px 9px 32px;color:var(--text);font-size:12px;letter-spacing:.02em}
.search input:focus{outline:none;border-color:var(--accent)}
.search input::placeholder{color:var(--text-3)}
.search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:12px;pointer-events:none}
.sortsel{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);padding:8px 10px;color:var(--text-2);font-size:11px}
.sortsel:focus{outline:none;border-color:var(--accent)}
.seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);padding:2px}
.seg button{font-size:10px;letter-spacing:.08em;padding:5px 11px;border-radius:5px;color:var(--text-3);font-weight:600}
.seg button.active{background:var(--accent);color:#08090b}

/* sector filter chips */
.secfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.secchip{font-size:10px;letter-spacing:.04em;padding:5px 11px;border-radius:20px;border:1px solid var(--line);color:var(--text-2);background:var(--panel-2);white-space:nowrap;transition:.12s}
.secchip:hover{color:var(--text);border-color:var(--text-3)}
.secchip.on{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
.secchip .n{color:var(--text-3);margin-left:5px;font-size:9px}
.secchip.on .n{color:var(--accent)}

/* sector group (grid) */
.secgroup{margin-bottom:20px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);overflow:hidden}
.secgroup-hd{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--panel-2);cursor:pointer;user-select:none}
.secgroup-hd:hover .sg-name{color:var(--accent)}
.sg-caret{color:var(--text-3);font-size:9px;width:10px;transition:transform .15s}
.secgroup.collapsed .sg-caret{transform:rotate(-90deg)}
.sg-name{font-size:11px;letter-spacing:.1em;font-weight:600;text-transform:uppercase}
.sg-count{font-size:9.5px;color:var(--text-3);letter-spacing:.04em}
.sg-sel{margin-left:auto;font-size:9.5px;letter-spacing:.04em;color:var(--accent);min-width:60px;text-align:right}
.sg-selall{font-size:9.5px;letter-spacing:.06em;color:var(--text-2);border:1px solid var(--line);border-radius:5px;padding:4px 9px}
.sg-selall:hover{color:var(--text);border-color:var(--text-3)}
.sg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:9px;padding:14px}
.secgroup.collapsed .sg-grid{display:none}

/* standard card */
.spc{position:relative;border:1px solid var(--line);border-radius:var(--r);background:var(--panel-2);padding:12px;cursor:pointer;transition:.12s;overflow:hidden}
.spc:hover{border-color:var(--text-3);transform:translateY(-2px)}
.spc.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 22px rgba(232,114,58,.10);background:linear-gradient(180deg,var(--accent-soft),var(--panel-2))}
.spc.tracked{cursor:default;opacity:.5}
.spc.tracked:hover{transform:none;border-color:var(--line)}
.spc-top{display:flex;align-items:flex-start;gap:9px}
.spc-id{min-width:0;flex:1}
.spc-tkr{font-size:14px;font-weight:700;letter-spacing:.02em}
.spc-name{font-size:10px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.spc-check{width:18px;height:18px;border-radius:5px;border:1px solid var(--line);flex:0 0 18px;display:grid;place-items:center;font-size:11px;color:transparent;transition:.12s;background:var(--panel)}
.spc.sel .spc-check{background:var(--accent);border-color:var(--accent);color:#08090b}
.spc-mid{display:flex;align-items:baseline;gap:8px;margin-top:11px}
.spc-price{font-size:13px;font-weight:600}
.spc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid var(--line-soft)}
.spc-cap{font-size:9.5px;color:var(--text-3);letter-spacing:.03em}
.spc-earn{font-size:9.5px;color:var(--amber);letter-spacing:.03em;display:inline-flex;align-items:center;gap:4px}
.spc-trackchip{font-size:8.5px;letter-spacing:.1em;color:var(--green);border:1px solid rgba(78,199,122,.35);background:rgba(78,199,122,.1);border-radius:4px;padding:2px 6px}
.up{color:var(--green)}.down{color:var(--red)}
.spc-chg{font-size:10.5px}

/* table */
.tbl-wrap{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--panel)}
table.sp-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.sp-tbl thead th{text-align:left;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);font-weight:600;padding:10px 12px;background:var(--panel-2);border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
.sp-tbl thead th.num{text-align:right}
.sp-tbl thead th:hover{color:var(--text-2)}
.sp-tbl thead th .ar{color:var(--accent);margin-left:4px;font-size:8px}
.sp-tbl tbody tr{border-bottom:1px solid var(--line-soft);cursor:pointer;transition:.1s}
.sp-tbl tbody tr:last-child{border-bottom:none}
.sp-tbl tbody tr:hover{background:var(--panel-2)}
.sp-tbl tbody tr.sel{background:var(--accent-soft)}
.sp-tbl tbody tr.tracked{opacity:.5;cursor:default}
.sp-tbl td{padding:9px 12px;white-space:nowrap}
.sp-tbl td.num{text-align:right}
.sp-tbl .tk{font-weight:700}
.sp-tbl .nm{color:var(--text-2)}
.sp-tbl .sc{color:var(--text-3);font-size:10px}
.tcheck{width:16px;height:16px;border-radius:4px;border:1px solid var(--line);display:grid;place-items:center;font-size:10px;color:transparent;background:var(--panel)}
tr.sel .tcheck{background:var(--accent);border-color:var(--accent);color:#08090b}
.t-earn{color:var(--amber)}

.count-line{font-size:10.5px;color:var(--text-3);letter-spacing:.04em;margin-bottom:12px}
.empty{padding:40px;text-align:center;color:var(--text-3);font-size:12px}

/* selection tray */
.tray{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(13,17,23,.92);backdrop-filter:blur(10px);border-top:1px solid var(--accent-line);transform:translateY(110%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
.tray.show{transform:translateY(0)}
.tray-inner{max-width:1180px;margin:0 auto;padding:13px 30px;display:flex;align-items:center;gap:16px}
.tray-count{font-size:12px;font-weight:600;white-space:nowrap}
.tray-count b{color:var(--accent);font-size:15px}
.tray-chips{flex:1;display:flex;gap:6px;overflow-x:auto;padding:2px 0;scrollbar-width:thin}
.tray-chip{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;padding:5px 8px;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);white-space:nowrap}
.tray-chip .x{color:var(--text-3);font-size:11px}
.tray-chip .x:hover{color:var(--red)}
.tray-clear{font-size:10px;letter-spacing:.06em;color:var(--text-3)}
.tray-clear:hover{color:var(--red)}

/* discover stage */
.disc-prog{height:3px;background:var(--line);border-radius:3px;overflow:hidden;margin:14px 0 22px}
.disc-prog span{display:block;height:100%;background:var(--accent);transition:width .4s}
.disc-row{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);margin-bottom:8px;overflow:hidden}
.disc-row.done{border-color:rgba(78,199,122,.3)}
.disc-row.confirm{border-color:rgba(227,165,46,.4)}
.disc-hd{display:flex;align-items:center;gap:11px;padding:12px 14px}
.disc-id{min-width:160px;display:flex;align-items:center;gap:10px}
.disc-tkr{font-weight:700;font-size:13px}
.disc-nm{font-size:10px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.disc-steps{flex:1;display:flex;flex-direction:column;gap:3px;font-size:10.5px;font-family:var(--sans)}
.disc-step{color:var(--text-3);display:flex;align-items:center;gap:7px}
.disc-step.ok{color:var(--text-2)}.disc-step.ok .b{color:var(--green)}
.disc-step.run{color:var(--text)}.disc-step.run .b{color:var(--accent)}
.disc-state{margin-left:auto;display:flex;align-items:center;gap:10px;white-space:nowrap}
.disc-found{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.statechip{font-size:9px;letter-spacing:.1em;padding:4px 9px;border-radius:5px;font-weight:600}
.statechip.found{color:var(--green);background:rgba(78,199,122,.1);border:1px solid rgba(78,199,122,.3)}
.statechip.confirm{color:var(--amber);background:rgba(227,165,46,.1);border:1px solid rgba(227,165,46,.35)}
.statechip.run{color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line)}
.disc-confirm{padding:0 14px 13px 14px;border-top:1px solid var(--line-soft);margin-top:2px;font-family:var(--sans);font-size:11px;color:var(--text-2)}
.disc-confirm .cands{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.cand{flex:1;min-width:200px;border:1px solid var(--line);border-radius:6px;padding:9px 11px;cursor:pointer;transition:.12s}
.cand:hover{border-color:var(--text-3)}
.cand.pick{border-color:var(--green);background:rgba(78,199,122,.08)}
.cand .u{font-family:var(--mono);font-size:10px;color:var(--blue);word-break:break-all}
.cand .w{font-size:9px;color:var(--text-3);margin-top:3px}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.done-hero{text-align:center;padding:60px 20px}
.done-hero .big{font-size:30px;font-weight:700;letter-spacing:.02em;margin-bottom:8px}
.done-hero .sub{color:var(--text-2);font-size:12px;font-family:var(--sans);max-width:440px;margin:0 auto 22px}

/* ===== Mobile (recent iPhones ~390–430px) ===== */
@media (max-width:640px){
  .screen{padding:20px 15px 130px}
  .screen-title{font-size:17px}
  .toolbar{gap:9px}
  .search{flex:1 1 100%;min-width:0}
  .sortsel{flex:1}
  .seg{flex:0 0 auto}
  .sg-grid{grid-template-columns:1fr;padding:11px}
  .secgroup-hd{flex-wrap:wrap;gap:9px}
  .sg-sel{min-width:0}
  /* table → horizontal scroll instead of clip */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.sp-tbl{min-width:580px}
  /* selection tray: actions on top row, chips scroll on their own row */
  .tray-inner{flex-wrap:wrap;padding:11px 15px;gap:10px}
  .tray-count{order:1}
  .tray-clear{order:2;margin-left:auto}
  .tray-inner .btn-primary{order:3}
  .tray-chips{order:4;flex-basis:100%;max-width:100%}
  /* discovery rows */
  .disc-hd{flex-wrap:wrap}
  .disc-id{min-width:0;flex:1 1 60%}
  .disc-state{margin-left:auto}
  .disc-steps{flex-basis:100%;order:3;margin-top:6px}
  .cand{min-width:0;flex-basis:100%}
  .done-hero{padding:44px 12px}
  .done-hero .big{font-size:24px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

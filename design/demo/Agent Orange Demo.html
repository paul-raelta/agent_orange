<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Agent Orange" />
<title>Agent Orange — Product Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="demo.css" />
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a0c10"/>
    <rect x="41" y="41" width="18" height="18" transform="rotate(45 50 50)" fill="#e8723a"/>
  </svg>
</template>
<div id="rot">
<div id="fit">
  <div id="frame" data-screen-label="0:00">
    <div id="cameraStage">
      <div id="camera">
        <div id="appwin"><div id="appmount"></div></div>
        <div id="cursor">
          <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 2 L3 21 L8.5 15.8 L12 23.5 L15 22.1 L11.5 14.5 L19 14.2 Z"
              fill="#fff" stroke="#0a0c10" stroke-width="1.4" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="click-ring" id="clickRing"></div>
      </div>
    </div>
    <div id="tstamp">0:00 / 1:26</div>
    <div id="caption"></div>
    <div id="title"></div>
  </div>
</div>

<div id="controls">
  <button id="playpause" aria-label="Play / pause">❚❚</button>
  <input id="scrub" type="range" min="0" max="94" value="0" step="0.01" aria-label="Scrubber" />
  <span id="time">0:00 / 1:26</span>
  <div id="chapters"></div>
</div>
</div>

<button id="fsbtn" aria-label="Toggle fullscreen" title="Fullscreen">⛶</button>

<script src="data.js"></script>
<script src="screens.js"></script>
<script src="notify.js"></script>
<script src="mobile.js"></script>
<script src="director.js"></script>
</body>
</html>

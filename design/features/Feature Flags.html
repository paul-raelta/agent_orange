<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Orange — Feature Flags</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07090c; --panel:#0d1117; --panel-2:#11161d; --raised:#161d27;
  --line:#222b37; --line-soft:#1a212b;
  --text:#e4e8ee; --text-2:#929dac; --text-3:#5f6975;
  --accent:#e8723a; --accent-soft:rgba(232,114,58,.13); --accent-line:rgba(232,114,58,.40);
  --green:#4ec77a; --red:#ff6b5e; --amber:#e3a52e; --blue:#5aa2f0;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --r:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
.delta-up{color:var(--green)}.delta-down{color:var(--red)}
.lbl3{font-size:9px;letter-spacing:.13em;color:var(--text-3);text-transform:uppercase;font-weight:600}

.fd-wrap{display:flex;min-height:100vh}
.fd-main{flex:1;min-width:0;display:flex;flex-direction:column}
.fd-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--panel)}
.fd-logo{font-size:13px;font-weight:700;letter-spacing:.16em;color:var(--accent)}
.fd-bar-sub{font-size:10.5px;color:var(--text-3);letter-spacing:.04em}
.fd-stage{flex:1;display:grid;grid-template-columns:1fr 1.15fr;gap:22px;padding:24px;align-content:start}
.fd-label{font-size:9.5px;letter-spacing:.13em;color:var(--text-3);text-transform:uppercase;font-weight:600;margin-bottom:11px}

/* glyph / chips */
.fd-glyph{width:34px;height:34px;flex:0 0 34px;border-radius:7px;display:grid;place-items:center;font-size:11px;font-weight:700;background:var(--raised);color:var(--text);border:1px solid var(--line);position:relative;overflow:hidden}
.fd-glyph::after{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;border-radius:2px;background:var(--g)}
.fd-glyph.sm{width:26px;height:26px;flex-basis:26px;font-size:9px}
.fd-tkr{font-size:15px;font-weight:700}
.fd-name{font-size:9.5px;color:var(--text-2);font-weight:400}
.fd-chip{font-size:8.5px;letter-spacing:.08em;font-weight:600;border:1px solid;border-radius:5px;padding:3px 7px;display:inline-flex;align-items:center;gap:5px}
.fd-dot{width:6px;height:6px;border-radius:50%}
.fd-beat{font-size:9px;letter-spacing:.06em;font-weight:700;color:var(--green);border:1px solid var(--green);background:rgba(78,199,122,.1);border-radius:5px;padding:3px 8px;white-space:nowrap}
.fd-conf{font-size:8px;letter-spacing:.08em;font-weight:600;border:1px solid;border-radius:4px;padding:2px 5px}

/* watchlist card */
.fd-card{border:1px solid var(--line);border-left:3px solid var(--g);border-radius:var(--r);background:var(--panel-2);padding:14px}
.fd-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.fd-price{display:flex;align-items:baseline;gap:9px;margin-bottom:13px}
.fd-pv{font-size:16px;font-weight:600}
.fd-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding-top:12px;border-top:1px solid var(--line-soft)}
.fd-mk{font-size:8px;letter-spacing:.05em;color:var(--text-3);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fd-mv{font-size:13px;font-weight:600;margin-top:3px}
.fd-ms{font-size:9px;margin-top:2px;font-weight:600}
.fd-md{font-size:9px;margin-top:2px}

/* deep-dive */
.fd-dd{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:15px}
.fd-dd-hd{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.fd-banner{display:flex;align-items:center;gap:10px;border:1px solid rgba(78,199,122,.3);background:rgba(78,199,122,.07);border-radius:6px;padding:9px 12px;margin-bottom:13px}
.fd-banner-tx{font-size:10.5px;font-family:var(--sans);color:var(--text-2)}
.fd-banner-tx b{color:var(--text)}
.fd-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:13px}
.fd-tab{font-size:9.5px;letter-spacing:.09em;font-weight:600;padding:8px 12px;color:var(--text-3);position:relative}
.fd-tab.on{color:var(--text);border-bottom:2px solid var(--accent)}
.fd-tab.fd-new::after{content:'';position:absolute;top:5px;right:4px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.fd-tbl{border:1px solid var(--line);border-radius:6px;overflow:hidden}
.fd-tr{display:grid;grid-template-columns:1.4fr 1fr .7fr;gap:8px;padding:8px 12px;font-size:11px;border-bottom:1px solid var(--line-soft);align-items:center}
.fd-tr.wide{grid-template-columns:1.4fr 1fr 1fr .8fr .6fr}
.fd-tr:last-child{border-bottom:none}
.fd-thead{background:var(--panel-2);font-size:8px;letter-spacing:.07em;color:var(--text-3);text-transform:uppercase;font-weight:600}
.fd-tr .num{text-align:right}
.fd-est{color:var(--text-3)}
.fd-placeholder{padding:26px;text-align:center;color:var(--text-3);font-size:11px;border:1px dashed var(--line);border-radius:6px}
/* guidance */
.fd-g-row{border:1px solid var(--line);border-radius:6px;background:var(--panel-2);padding:11px 13px;margin-bottom:8px}
.fd-g-top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.fd-g-metric{font-size:12px;font-weight:600}
.fd-g-period{font-size:9px;color:var(--text-3)}
.fd-g-dir{margin-left:auto;font-size:8px;letter-spacing:.07em;font-weight:700;border:1px solid;border-radius:4px;padding:2px 6px}
.fd-g-range{display:flex;align-items:baseline;gap:9px;margin-bottom:7px}
.fd-g-now{font-size:14px;font-weight:700}
.fd-g-prior{font-size:9.5px;color:var(--text-3);text-decoration:line-through}
.fd-g-prov{font-size:9px;color:var(--text-3);font-family:var(--sans);font-style:italic}

/* review */
.fd-review{}
.fd-rev-hd{margin-bottom:10px}
.fd-simple{border:1px solid var(--line);border-radius:var(--r);background:var(--panel-2);padding:13px}
.fd-simple-row{display:flex;align-items:center;gap:11px}
.fd-mini{font-size:10px;letter-spacing:.05em;font-weight:600;padding:7px 12px;border-radius:5px;background:var(--accent);color:#08090b}
.fd-mini.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text-2)}
.fd-cw{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);overflow:hidden}
.fd-cw-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--panel-2)}
.fd-flag{margin-left:auto;font-size:8.5px;letter-spacing:.08em;font-weight:600;color:var(--amber);border:1px solid rgba(227,165,46,.4);background:rgba(227,165,46,.1);border-radius:5px;padding:3px 8px}
.fd-diff{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.fd-col{background:var(--panel);padding:14px;cursor:pointer;transition:.15s}
.fd-col:hover{background:var(--panel-2)}
.fd-col.pick{background:linear-gradient(180deg,rgba(78,199,122,.09),var(--panel))}
.fd-col-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.fd-srcpill{font-size:9px;color:var(--text-2);border:1px solid var(--line);border-radius:5px;padding:3px 7px}
.fd-srcpill b{color:var(--accent);font-size:8px}
.fd-val{font-size:26px;font-weight:700;margin-bottom:12px}
.fd-pickbtn{width:100%;font-size:10px;letter-spacing:.05em;font-weight:600;padding:8px;border-radius:5px;border:1px solid var(--line);background:var(--panel-2);color:var(--text-2);transition:.15s}
.fd-pickbtn.on{background:var(--green);border-color:var(--green);color:#08130b}
.fd-vs{position:absolute;left:50%;top:58px;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:var(--raised);border:1px solid var(--line);display:grid;place-items:center;font-size:8.5px;font-weight:700;color:var(--text-3)}

/* settings rail */
.fd-rail{width:330px;flex:0 0 330px;border-left:1px solid var(--line);background:var(--panel);position:sticky;top:0;height:100vh;overflow-y:auto}
.fd-settings{padding:0}
.fd-set-hd{display:flex;align-items:center;gap:11px;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
.fd-gear{font-size:18px;color:var(--accent)}
.fd-set-t{font-size:12px;font-weight:700;letter-spacing:.13em}
.fd-set-s{font-size:9.5px;color:var(--text-3);margin-top:2px}
.fd-flag-row{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line-soft)}
.fd-flag-info{flex:1;min-width:0}
.fd-flag-name{font-size:12px;font-weight:600;margin-bottom:4px}
.fd-flag-desc{font-size:10.5px;color:var(--text-2);font-family:var(--sans);line-height:1.45;margin-bottom:6px}
.fd-flag-surf{font-size:9px;color:var(--text-3);letter-spacing:.02em}
.fd-sw{width:38px;height:21px;border-radius:12px;background:var(--raised);border:1px solid var(--line);position:relative;flex:0 0 38px;transition:.18s;margin-top:2px}
.fd-sw::after{content:'';position:absolute;top:1px;left:1px;width:17px;height:17px;border-radius:50%;background:var(--text-3);transition:.18s}
.fd-sw.on{background:var(--accent-soft);border-color:var(--accent-line)}
.fd-sw.on::after{transform:translateX(17px);background:var(--accent)}
.fd-set-note{padding:16px 20px;font-size:10px;color:var(--text-3);font-family:var(--sans);line-height:1.55}
@media (max-width:920px){.fd-stage{grid-template-columns:1fr}}
</style>
</head>

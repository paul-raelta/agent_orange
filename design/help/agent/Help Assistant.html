<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Orange — Help Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07090c; --panel:#0d1117; --panel-2:#11161d; --raised:#161d27;
  --line:#222b37; --line-soft:#1a212b;
  --text:#e4e8ee; --text-2:#929dac; --text-3:#5f6975;
  --accent:#e8723a; --accent-soft:rgba(232,114,58,.13); --accent-line:rgba(232,114,58,.40);
  --green:#4ec77a; --red:#ff6b5e; --amber:#e3a52e; --blue:#5aa2f0;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --r:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select{font-family:inherit}

/* faux app backdrop so the assistant reads as in-context */
.backdrop{position:fixed;inset:0;overflow:hidden}
.backdrop img{width:100%;height:100%;object-fit:cover;object-position:top left;filter:saturate(.9) brightness(.46)}
.backdrop::after{content:'';position:absolute;inset:0;background:radial-gradient(120% 100% at 80% 60%, rgba(0,0,0,.4), rgba(7,9,12,.82))}

/* launcher */
.ha-launch{position:fixed;right:24px;bottom:24px;z-index:50;display:flex;align-items:center;gap:9px;
  background:var(--accent);color:#08090b;font-size:12.5px;font-weight:600;letter-spacing:.03em;
  padding:12px 18px;border-radius:30px;box-shadow:0 12px 34px rgba(232,114,58,.4)}
.ha-launch:hover{filter:brightness(1.07)}
.ha-launch-i{font-size:15px}

/* panel */
.ha-panel{position:fixed;right:24px;bottom:24px;z-index:51;width:392px;max-width:calc(100vw - 32px);
  height:600px;max-height:calc(100vh - 40px);display:flex;flex-direction:column;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.4)}
.ha-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;
  background:var(--panel-2);border-bottom:1px solid var(--line)}
.ha-hd-l{display:flex;align-items:center;gap:11px}
.ha-mark{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);border:1px solid var(--accent-line);
  color:var(--accent);font-size:16px;display:grid;place-items:center}
.ha-title{font-size:12px;letter-spacing:.14em;font-weight:700}
.ha-sub{font-size:10px;color:var(--text-3);margin-top:2px}
.ha-x{width:26px;height:26px;border-radius:6px;color:var(--text-3);font-size:13px;display:grid;place-items:center}
.ha-x:hover{background:var(--raised);color:var(--text)}

/* screen-context strip */
.ha-ctx{display:flex;align-items:center;gap:9px;padding:9px 16px;border-bottom:1px solid var(--line-soft);background:var(--panel)}
.ha-ctx-l{font-size:9.5px;letter-spacing:.1em;color:var(--text-3);text-transform:uppercase;font-weight:600}
.ha-ctx select{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;color:var(--text);
  font-size:11px;padding:4px 8px}
.ha-ctx select:focus{outline:none;border-color:var(--accent)}
.ha-ctx-h{font-size:9.5px;color:var(--text-3);margin-left:auto;font-style:italic;font-family:var(--sans)}

/* messages */
.ha-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin}
.ha-msg{display:flex;gap:9px;max-width:100%}
.ha-msg.user{justify-content:flex-end}
.ha-msg.user .ha-b{background:var(--accent);color:#08090b;border-radius:12px 12px 3px 12px;max-width:80%}
.ha-msg.bot .ha-b{background:var(--panel-2);border:1px solid var(--line);border-radius:12px 12px 12px 3px;max-width:84%}
.ha-ava{flex:0 0 26px;height:26px;border-radius:7px;background:var(--accent-soft);border:1px solid var(--accent-line);
  color:var(--accent);font-size:13px;display:grid;place-items:center;margin-top:1px}
.ha-b{padding:10px 13px;font-family:var(--sans);font-size:13px;line-height:1.5}
.ha-b p{margin:0}
.ha-b p+p{margin-top:7px}
.ha-b b{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.ha-msg.user .ha-b b{color:#08090b}
.ha-ol{margin:4px 0 0;padding-left:0;list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:6px}
.ha-ol li{counter-increment:s;display:flex;gap:9px;align-items:baseline}
.ha-ol li::before{content:counter(s);flex:0 0 17px;height:17px;border-radius:50%;background:var(--accent-soft);
  border:1px solid var(--accent-line);color:var(--accent);font-family:var(--mono);font-size:9.5px;font-weight:700;
  display:grid;place-items:center;align-self:flex-start;margin-top:1px}
.ha-dots{display:inline-flex;gap:4px;padding:2px 0}
.ha-dots i{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:hb 1.2s infinite}
.ha-dots i:nth-child(2){animation-delay:.2s}.ha-dots i:nth-child(3){animation-delay:.4s}
@keyframes hb{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

/* starter chips */
.ha-starters{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.ha-chip{font-size:11.5px;color:var(--text-2);background:var(--panel-2);border:1px solid var(--line);
  border-radius:16px;padding:7px 12px;font-family:var(--sans);transition:.12s;text-align:left}
.ha-chip:hover{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}

/* input */
.ha-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:var(--panel)}
.ha-input input{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
  padding:11px 13px;color:var(--text);font-size:13px;font-family:var(--sans)}
.ha-input input:focus{outline:none;border-color:var(--accent)}
.ha-input button{flex:0 0 40px;width:40px;border-radius:9px;background:var(--accent);color:#08090b;
  font-size:16px;font-weight:700;display:grid;place-items:center}
.ha-input button:disabled{opacity:.4;cursor:default}
.ha-foot{padding:0 14px 11px;font-size:9.5px;color:var(--text-3);text-align:center;font-family:var(--sans)}

@media(max-width:480px){.ha-panel{right:8px;bottom:8px;height:calc(100vh - 16px)}}
</style>
</head>
<body>
<div class="backdrop"><img src="../img/watchlist.jpg" alt="" /></div>
<div id="agent-root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="knowledge.js"></script>
<script type="text/babel" src="helpagent.jsx"></script>
</body>
</html>

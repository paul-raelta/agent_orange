<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Agent Orange — Product Demo</title>
<style>
  :root { --accent: #e8723a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  body { font-family: 'IBM Plex Mono', ui-monospace, monospace; color: #e4e8ee; }
  #root, iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* mobile video player */
  .vidwrap { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; }
  .vidwrap video { width: 100%; height: 100%; object-fit: contain; background: #000; }
  .switch {
    position: fixed; left: 50%; bottom: max(14px, env(safe-area-inset-bottom)); transform: translateX(-50%);
    z-index: 10; font-size: 12px; letter-spacing: .04em; color: #929dac; text-decoration: none;
    background: rgba(13,17,23,.85); border: 1px solid #222b37; border-radius: 20px; padding: 8px 16px;
    backdrop-filter: blur(8px); white-space: nowrap;
  }
  .switch:hover { color: #e4e8ee; }
  .vfallback {
    position: fixed; inset: 0; display: flex; flex-direction: column; gap: 16px;
    align-items: center; justify-content: center; text-align: center; padding: 32px;
    background: radial-gradient(900px 600px at 50% 40%, #14181f 0%, #0a0c10 60%, #050608 100%);
  }
  .vfallback .mk { width: 44px; height: 44px; background: var(--accent); transform: rotate(45deg); box-shadow: 0 0 40px rgba(232,114,58,.5); margin-bottom: 8px; }
  .vfallback h1 { font-size: 16px; letter-spacing: .2em; font-weight: 700; }
  .vfallback p { font-family: 'IBM Plex Sans', system-ui, sans-serif; font-size: 14px; color: #929dac; max-width: 320px; line-height: 1.5; }
  .vfallback a { color: var(--accent); text-decoration: none; font-size: 14px; border: 1px solid rgba(232,114,58,.4); border-radius: 8px; padding: 11px 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var force = params.get("view"); // "video" forces player, "app" forces interactive
  var root = document.getElementById("root");

  function isMobile() {
    var ua = navigator.userAgent || "";
    var mobUA = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
    // iPadOS reports as Mac — detect via touch points
    var iPadOS = /Macintosh/i.test(ua) && navigator.maxTouchPoints > 1;
    var coarseSmall = window.matchMedia("(pointer: coarse)").matches &&
      Math.min(window.screen.width, window.screen.height) <= 900;
    return mobUA || iPadOS || coarseSmall;
  }

  var goVideo = force === "video" || (force !== "app" && isMobile());

  if (goVideo) {
    root.innerHTML =
      '<div class="vidwrap">' +
        '<video id="v" poster="poster.jpg" controls autoplay muted playsinline webkit-playsinline preload="auto">' +
          '<source src="demo.mp4" type="video/mp4">' +
          '<source src="demo.webm" type="video/webm">' +
        '</video>' +
        '<a class="switch" href="?view=app">Open interactive version &rsaquo;</a>' +
      '</div>';

    var v = document.getElementById("v");
    var failed = false;
    function fallback() {
      if (failed) return; failed = true;
      root.innerHTML =
        '<div class="vfallback">' +
          '<div class="mk"></div>' +
          '<h1>AGENT&nbsp;ORANGE</h1>' +
          '<p>The demo video isn\'t available yet. You can watch the interactive version instead.</p>' +
          '<a href="?view=app">Open the interactive demo &rsaquo;</a>' +
        '</div>';
    }
    // <video> error fires when no <source> can load (e.g. demo.mp4 returns 404)
    v.addEventListener("error", fallback, true);
    // backup: if after a grace period nothing loaded AND there is no source, fall back
    setTimeout(function () {
      if (failed) return;
      if (v.videoWidth || v.readyState >= 2 || !v.paused) return; // playing / has data — fine
      if (v.networkState === 3 /* NO_SOURCE */ || v.error) fallback();
    }, 6000);
    // attempt autoplay; if blocked, the native controls allow tap-to-play
    if (v.play) { var pr = v.play(); if (pr && pr.catch) pr.catch(function () {}); }
  } else {
    var f = document.createElement("iframe");
    f.src = "interactive.html";
    f.setAttribute("allow", "fullscreen; autoplay");
    f.setAttribute("title", "Agent Orange — interactive demo");
    root.appendChild(f);
  }
})();
</script>
</body>
</html>

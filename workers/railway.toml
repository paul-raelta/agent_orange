# Railway service config — backend (FastAPI + APScheduler).
# Set this service's Root Directory to `workers` in the Railway dashboard so
# Nixpacks finds pyproject.toml here. watchPatterns are repo-rooted, so only
# changes under workers/ trigger a redeploy of this service.

[build]
builder = "NIXPACKS"
watchPatterns = ["workers/**"]

[deploy]
startCommand = "uvicorn ao.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
